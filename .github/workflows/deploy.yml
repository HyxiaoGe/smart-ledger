name: Deploy to Local Server

on:
  push:
    branches: [ "master" ]

  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Export deploy metadata
        run: |
          echo "GIT_SHA=${GITHUB_SHA}" >> $GITHUB_ENV
          echo "Deploy commit: ${GITHUB_SHA}"

      - name: Run Docker Deploy
        run: |
          cp /home/heyanxiao/project/smart-ledger/.env.local .
          cp /home/heyanxiao/project/smart-ledger/.env.local .env

          echo "开始自动部署..."
          echo "部署提交: ${GIT_SHA}"
          docker compose down
          docker compose up -d --build
          docker image prune -f
          echo "部署完成！"
          docker inspect smart-ledger-app-1 --format 'APP_GIT_SHA={{range .Config.Env}}{{println .}}{{end}}' | grep APP_GIT_SHA || true
